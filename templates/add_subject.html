{% extends "base.html" %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-5 card p-4">
        <h3 class="mb-4">Tạo môn học mới</h3>
        <form method="POST">
            <div class="mb-3">
                <label class="form-label">Tên môn học</label>
                <input type="text" name="name" class="form-control" placeholder="Ví dụ: Python, Tiếng Anh..." required>
            </div>
            <div class="mb-3">
                <label class="form-label">Màu sắc chủ đề</label>
                <input type="color" name="color" class="form-control form-control-color w-100" value="#4361ee">
            </div>
            <button class="btn btn-primary w-100">Lưu môn học</button>
            <a href="/" class="btn btn-link w-100 mt-2 text-decoration-none">Quay lại</a>
        </form>
    </div>
</div>
{% endblock %}
