{% extends "base.html" %}
{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-5">
        <div class="card p-4 shadow-sm" style="border-radius: 15px;">
            <h3 class="fw-bold text-center mb-4 text-primary">ĐĂNG KÝ THÀNH VIÊN</h3>
            
            {% with messages = get_flashed_messages() %}
              {% if messages %}
                {% for m in messages %}
                  <div class="alert alert-warning alert-dismissible fade show small" role="alert">
                    <i class="fas fa-exclamation-triangle me-2"></i>{{ m }}
                    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                  </div>
                {% endfor %}
              {% endif %}
            {% endwith %}

            <form method="POST" action="{{ url_for('register') }}">
                <div class="mb-3">
                    <label class="form-label small fw-bold text-uppercase">Tên đăng nhập</label>
                    <div class="input-group">
                        <span class="input-group-text bg-light"><i class="fas fa-user text-muted"></i></span>
                        <input type="text" name="username" class="form-control bg-light" placeholder="Ví dụ: hungphat_id" required autofocus>
                    </div>
                </div>
                
                <div class="mb-4">
                    <label class="form-label small fw-bold text-uppercase">Mật khẩu</label>
                    <div class="input-group">
                        <span class="input-group-text bg-light"><i class="fas fa-lock text-muted"></i></span>
                        <input type="password" name="password" class="form-control bg-light" placeholder="Tối thiểu 6 ký tự" required>
                    </div>
                </div>

                <button type="submit" class="btn btn-primary w-100 fw-bold py-2 shadow-sm">
                    TẠO TÀI KHOẢN
                </button>
            </form>

            <div class="text-center mt-4">
                <p class="small text-muted">
                    Đã có tài khoản? 
                    <a href="{{ url_for('login') }}" class="fw-bold text-decoration-none">Đăng nhập ngay</a>
                </p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
